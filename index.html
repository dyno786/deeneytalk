<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deeney Talk</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #eaf7ff, #eefdf3, #fff7e8);
      color: #1f2937;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 16px;
    }
    .header {
      background: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 40px;
    }
    .sub {
      font-size: 20px;
      color: #4b5563;
      margin: 0;
    }
    .tabs {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      background: white;
      border-radius: 24px;
      padding: 14px;
      margin-bottom: 18px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.06);
    }
    .tab {
      border: 1px solid #d1d5db;
      background: #f8fafc;
      border-radius: 18px;
      padding: 14px 20px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }
    .tab.active {
      background: #111827;
      color: white;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
    }
    .card {
      background: white;
      border: none;
      border-radius: 26px;
      padding: 14px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.08);
      cursor: pointer;
    }
    .card:active { transform: scale(0.98); }
    .imgbox {
      aspect-ratio: 1 / 1;
      border-radius: 24px;
      overflow: hidden;
      background: #e0f2fe;
      border: 2px solid #dbeafe;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }
    .imgbox img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .emoji {
      font-size: 84px;
    }
    .label {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .phrase {
      font-size: 18px;
      color: #6b7280;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 999;
    }
    .modal.show { display: flex; }
    .modal-box {
      width: 100%;
      max-width: 760px;
      background: white;
      border-radius: 28px;
      padding: 18px;
      position: relative;
    }
    .close {
      position: absolute;
      right: 16px;
      top: 16px;
      border: none;
      background: #f1f5f9;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      font-size: 28px;
      cursor: pointer;
    }
    .bigimg {
      aspect-ratio: 1 / 1;
      border-radius: 28px;
      overflow: hidden;
      background: #e0f2fe;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bigimg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .bigemoji {
      font-size: 160px;
    }
    .biglabel {
      text-align: center;
      font-size: 48px;
      font-weight: 900;
      margin-top: 16px;
    }
    .bigphrase {
      text-align: center;
      font-size: 26px;
      color: #6b7280;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Deeney Talk</h1>
      <p class="sub">Tap a tab, then press a picture to hear it and see it bigger.</p>
    </div>

    <div class="tabs" id="tabs"></div>
    <div class="grid" id="grid"></div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <button class="close" onclick="closeModal()">×</button>
      <div class="bigimg" id="modalImage"></div>
      <div class="biglabel" id="modalLabel"></div>
      <div class="bigphrase" id="modalPhrase"></div>
    </div>
  </div>

  <script>
    const items = [
      { category: "People", label: "Mum", phrase: "Mum", image: "mum.jpg", emoji: "👩" },
      { category: "People", label: "Dad", phrase: "Dad", image: "dad.jpg", emoji: "👨" },
      { category: "People", label: "Grandma", phrase: "Grandma", image: "grandma.jpg", emoji: "👵" },

      { category: "Food", label: "Drink", phrase: "I want a drink", image: "drink.jpg", emoji: "💧" },
      { category: "Food", label: "Food", phrase: "I want food", image: "food.jpg", emoji: "🍽️" },
      { category: "Food", label: "Banana", phrase: "I want banana", image: "banana.jpg", emoji: "🍌" },

      { category: "Play Time", label: "Park", phrase: "I want the park", image: "park.jpg", emoji: "🛝" },
      { category: "Play Time", label: "Toy", phrase: "I want my toy", image: "toy.jpg", emoji: "🧸" },
      { category: "Play Time", label: "Ball", phrase: "I want ball", image: "ball.jpg", emoji: "⚽" }
    ];

    const categories = ["People", "Food", "Play Time"];
    let currentCategory = "People";

    function speakText(text) {
      if (!("speechSynthesis" in window)) return;
      const msg = new SpeechSynthesisUtterance(text);
      msg.rate = 0.85;
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(msg);
    }

    function playClapSound() {
      try {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) return;
        const ctx = new AudioContextClass();
        const now = ctx.currentTime;

        function burst(start, duration, gainValue) {
          const bufferSize = Math.floor(ctx.sampleRate * duration);
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize / 5));
          }
          const source = ctx.createBufferSource();
          source.buffer = buffer;
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(gainValue, start);
          gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
          const filter = ctx.createBiquadFilter();
          filter.type = "bandpass";
          filter.frequency.value = 1800;
          filter.Q.value = 0.7;
          source.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);
          source.start(start);
          source.stop(start + duration);
        }

        burst(now, 0.12, 0.45);
        burst(now + 0.14, 0.12, 0.35);
      } catch (e) {}
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "tab" + (cat === currentCategory ? " active" : "");
        btn.textContent = cat;
        btn.onclick = () => {
          currentCategory = cat;
          renderTabs();
          renderGrid();
        };
        tabs.appendChild(btn);
      });
    }

    function renderGrid() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      items
        .filter(item => item.category === currentCategory)
        .forEach(item => {
          const card = document.createElement("button");
          card.className = "card";
          card.onclick = () => openItem(item);

          const imgbox = document.createElement("div");
          imgbox.className = "imgbox";

          const img = document.createElement("img");
          img.src = item.image;
          img.alt = item.label;
          img.onerror = function() {
            imgbox.innerHTML = `<div class="emoji">${item.emoji || "🧩"}</div>`;
          };

          imgbox.appendChild(img);

          const label = document.createElement("div");
          label.className = "label";
          label.textContent = item.label;

          const phrase = document.createElement("div");
          phrase.className = "phrase";
          phrase.textContent = item.phrase;

          card.appendChild(imgbox);
          card.appendChild(label);
          card.appendChild(phrase);
          grid.appendChild(card);
        });
    }

    function openItem(item) {
      document.getElementById("modalLabel").textContent = item.label;
      document.getElementById("modalPhrase").textContent = item.phrase;

      const modalImage = document.getElementById("modalImage");
      modalImage.innerHTML = "";

      const img = document.createElement("img");
      img.src = item.image;
      img.alt = item.label;
      img.onerror = function() {
        modalImage.innerHTML = `<div class="bigemoji">${item.emoji || "🧩"}</div>`;
      };

      modalImage.appendChild(img);
      document.getElementById("modal").classList.add("show");

      playClapSound();
      speakText(item.phrase || item.label);
    }

    function closeModal() {
      document.getElementById("modal").classList.remove("show");
    }

    document.getElementById("modal").addEventListener("click", function(e) {
      if (e.target.id === "modal") closeModal();
    });

    renderTabs();
    renderGrid();
  </script>
</body>
</html>
